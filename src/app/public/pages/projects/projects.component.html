<main>
  <!-- TODO: Diferenciar un poco más el título de la página -->
  <h1>Projects</h1>
  <article *ngFor="let project of projects">
    <header (click)="open(project._id)">
      <h2>{{ project.title }}</h2>
      <p>{{ project.year }}</p>
    </header>
    <!-- <div class="collapsible" [@collapse]="collapsedStates[project._id]"> -->
    <div class="collapsible" [@slideInOut]="animationState">
      <section class="project-details">
        <div>
          <h3>DIR:</h3>
          <p>{{ project.director }}</p>
        </div>
        <div>
          <h3>DOP:</h3>
          <p>{{ project.dop }}</p>
        </div>
      </section>
      <section class="project-image">
        <figure><img [src]="project.img" alt="Project image" /></figure>
        <div>
          <p>{{ project.category }}</p>
          <a [href]="project.trailerUrl" target="_blank">Watch trailer</a>
        </div>
      </section>
    </div>
  </article>
</main>
