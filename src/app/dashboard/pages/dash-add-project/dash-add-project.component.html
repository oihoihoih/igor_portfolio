<form>
  <h2>Añadir proyecto</h2>
  <p>
    Todos los campos que contengan un asterisco
    <strong><span aria-label="required">*</span></strong> son obligatorios
  </p>
  <p>
    <label for="title">
      <span>Título del proyecto: </span>
      <strong><span aria-label="required">*</span></strong>
    </label>
    <input type="text" id="title" name="title" required />
  </p>

  <p>
    <label for="year">
      <span>Año: </span>
      <strong><span aria-label="required">*</span></strong>
    </label>
    <input type="number" id="year" name="year" required />
  </p>

  <p>
    <label for="director">
      <span>Director: </span>
      <strong><span aria-label="required">*</span></strong>
    </label>
    <input type="number" id="director" name="director" required />
  </p>

  <p>
    <label for="DOP">
      <span>DOP: </span>
      <strong><span aria-label="required">*</span></strong>
    </label>
    <input type="string" id="DOP" name="DOP" required />
  </p>

  <p>
    <label for="category">
      <span>Categoría de la película: </span>
      <strong><span aria-label="required">*</span></strong>
    </label>
    <input type="string" id="category" name="category" required />
  </p>

  <p>
    <!-- TODO: Añadir sistema de carga de imagen -->
    <label for="imageUrl">
      <span>Url de la imagen: </span>
      <strong><span aria-label="required">*</span></strong>
    </label>
    <input type="string" id="imageUrl" name="imageUrl" required />
  </p>

  <p>
    <label for="trailerUrl">
      <span>Url del trailer: </span>
    </label>
    <input type="number" id="trailerUrl" name="trailerUrl" />
  </p>
</form>
